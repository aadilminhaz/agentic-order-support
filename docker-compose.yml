version: '3.8'

services:
  # Spring Boot Backend
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: order-support-agent-backend
    ports:
      - "8080:8080"
    environment:
      - GOOGLE_API_KEY=${GOOGLE_API_KEY}
      - SPRING_APPLICATION_NAME=order-support-agent
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  # React UI
  chat-ui:
    build:
      context: ./agentic-order-support-ui
      dockerfile: Dockerfile
      args:
        REACT_APP_BASE_URL: http://backend:8080
    container_name: order-support-agent-ui
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    environment:
      - REACT_APP_BASE_URL=http://localhost:8080

networks:
  default:
    name: order-support-network

